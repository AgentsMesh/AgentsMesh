id: TC-SSO-ENF-003
name: enforce_sso — UI 隐藏密码框和 OAuth
description: 验证 enforce_sso 开启时，登录页隐藏密码输入框和 OAuth 按钮，只显示 SSO 选项
priority: critical
must_execute: true
module: account/auth/sso/enforce
tags:
  - ui
  - mcp-required

preconditions:
  - 开发环境已启动
  - 域名 agentsmesh.local 至少有一个 enforce_sso=true 的 SSO 配置

setup:
  sql: |
    UPDATE sso_configs SET enforce_sso = true WHERE domain = 'agentsmesh.local' AND protocol = 'ldap';

steps:
  - action: 导航到登录页并触发 SSO 发现
    expected: 密码框、登录按钮、OAuth 按钮全部隐藏；只显示 SSO 卡片
    verification:
      type: ui
      navigate: /login
      steps:
        - fill: 'textbox "邮箱"'
          value: dev@agentsmesh.local
        - click: 'body'
        - wait_for: 'button contains "OIDC" or button contains "LDAP"'
      check:
        - exists: 'button contains "OIDC"'
        - exists: 'button contains "LDAP"'
        - not_exists: 'label "密码" or label "Password"'
        - not_exists: 'button contains "GitHub"'
        - not_exists: 'button contains "Google"'
        - not_exists: 'button "登录" or button "Sign in"'

cleanup:
  - sql: |
      UPDATE sso_configs SET enforce_sso = false WHERE domain = 'agentsmesh.local' AND protocol = 'ldap';
