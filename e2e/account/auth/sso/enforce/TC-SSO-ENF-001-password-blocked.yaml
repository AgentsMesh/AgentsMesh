id: TC-SSO-ENF-001
name: enforce_sso — 密码登录被拒绝
description: 验证当域名开启 enforce_sso 时，普通用户密码登录返回 SSO_REQUIRED
priority: critical
module: account/auth/sso/enforce

preconditions:
  - 开发环境已启动
  - 域名 agentsmesh.local 至少有一个 enforce_sso=true 的 SSO 配置

setup:
  sql: |
    UPDATE sso_configs SET enforce_sso = true WHERE domain = 'agentsmesh.local' AND protocol = 'ldap';

steps:
  - action: 使用该域名普通用户凭证调用登录 API
    expected: 返回 SSO_REQUIRED 错误
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 403
        body:
          code: SSO_REQUIRED

cleanup:
  - sql: |
      UPDATE sso_configs SET enforce_sso = false WHERE domain = 'agentsmesh.local' AND protocol = 'ldap';
