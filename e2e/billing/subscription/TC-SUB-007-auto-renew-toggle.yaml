id: TC-SUB-007
name: 自动续费开关
description: 验证开启/关闭自动续费功能
priority: high
module: billing/subscription

preconditions:
  - 开发环境已启动
  - 组织有活跃的付费订阅

setup:
  sql: |
    -- 设置组织为 Pro 计划，自动续费开启
    UPDATE subscriptions
    SET plan_id = (SELECT id FROM subscription_plans WHERE name = 'pro'),
        status = 'active',
        auto_renew = true
    WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 查询当前自动续费状态
    expected: 返回 auto_renew = true
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/billing/subscription
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          subscription:
            auto_renew: true

  - id: step-3
    action: 关闭自动续费
    expected: 自动续费状态更新为 false
    verification:
      type: api
      request:
        method: PUT
        url: /api/v1/orgs/dev-org/billing/subscription/auto-renew
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          auto_renew: false
      expected:
        status: 200
        body:
          auto_renew: false

  - id: step-4
    action: 验证数据库状态
    expected: auto_renew 字段为 false
    verification:
      type: database
      query: |
        SELECT auto_renew
        FROM subscriptions
        WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
      expected:
        auto_renew: false

  - id: step-5
    action: 重新开启自动续费
    expected: 自动续费状态更新为 true
    verification:
      type: api
      request:
        method: PUT
        url: /api/v1/orgs/dev-org/billing/subscription/auto-renew
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          auto_renew: true
      expected:
        status: 200
        body:
          auto_renew: true

  - id: step-6
    action: 验证数据库状态已恢复
    expected: auto_renew 字段为 true
    verification:
      type: database
      query: |
        SELECT auto_renew
        FROM subscriptions
        WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org')
      expected:
        auto_renew: true

cleanup:
  - sql: |
      UPDATE subscriptions
      SET auto_renew = true
      WHERE organization_id = (SELECT id FROM organizations WHERE slug = 'dev-org');
