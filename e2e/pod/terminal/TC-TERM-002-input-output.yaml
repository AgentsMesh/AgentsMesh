id: TC-TERM-002
name: 终端输入输出
description: 验证终端输入发送和输出观察功能
priority: high
module: pod/terminal

preconditions:
  - 开发环境已启动
  - 用户已登录
  - 至少有一个 running 状态的 Pod

steps:
  - id: step-1
    action: 登录并获取 token
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/auth/login
        headers:
          Content-Type: application/json
        body:
          email: dev@agentsmesh.local
          password: devpass123
      expected:
        status: 200
        body:
          token: not_empty
      save:
        access_token: body.token

  - id: step-2
    action: 获取可用 Runner
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/runners/available
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          runners: not_empty
      save:
        runner_id: body.runners[0].id

  - id: step-3
    action: 获取可用 Agent 类型
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/agents/types
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          agent_types: not_empty
      save:
        agent_type_id: body.agent_types[0].id

  - id: step-4
    action: 创建 Pod
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          runner_id: "{runner_id}"
          agent_type_id: "{agent_type_id}"
          initial_prompt: "E2E Terminal Input/Output Test"
      expected:
        status: 201
        body:
          pod:
            pod_key: not_empty
      save:
        pod_key: body.pod.pod_key

  - id: step-5
    action: 等待 Pod 状态变为 running
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod:
            status: running
      retry:
        max_attempts: 10
        interval: 3000

  - id: step-6
    action: 发送终端输入
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminal/input
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          input: "echo 'E2E_TEST_MARKER_12345'\n"
      expected:
        status: 200
        body:
          message: contains(sent)

  - id: step-7
    action: 获取终端输出（默认行数）
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminal/observe
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod_key: "{pod_key}"
          output: not_empty
      retry:
        max_attempts: 5
        interval: 2000

  - id: step-8
    action: 获取终端输出（指定行数）
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminal/observe?lines=50
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod_key: "{pod_key}"
          output: not_empty
          total_lines: less_than_or_equal(50)

  - id: step-9
    action: 获取终端输出（包含屏幕快照）
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminal/observe?include_screen=true
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod_key: "{pod_key}"
          output: not_empty

  - id: step-10
    action: 获取原始终端输出
    verification:
      type: api
      request:
        method: GET
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminal/observe?raw=true
        headers:
          Authorization: Bearer {access_token}
      expected:
        status: 200
        body:
          pod_key: "{pod_key}"

  - id: step-11
    action: 发送空输入应失败
    verification:
      type: api
      request:
        method: POST
        url: /api/v1/orgs/dev-org/pods/{pod_key}/terminal/input
        headers:
          Authorization: Bearer {access_token}
          Content-Type: application/json
        body:
          input: ""
      expected:
        status: 400

cleanup:
  - api:
      method: POST
      url: /api/v1/orgs/dev-org/pods/{pod_key}/terminate
      headers:
        Authorization: Bearer {access_token}
