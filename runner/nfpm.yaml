# nfpm configuration for Linux packages
# https://nfpm.goreleaser.com/configuration/

name: agentsmesh-runner
arch: amd64
platform: linux
version: ${VERSION:-1.0.0}
section: utils
priority: optional
maintainer: AgentsMesh Team <support@agentsmesh.ai>
description: |
  AgentsMesh Runner - AI Agent Task Executor

  The AgentsMesh Runner connects to the AgentsMesh server and executes
  AI agent tasks in isolated terminal environments.
vendor: AgentsMesh
homepage: https://agentsmesh.ai
license: MIT

contents:
  # Binary
  - src: ./bin/runner-linux-amd64
    dst: /usr/local/bin/runner
    file_info:
      mode: 0755

  # Systemd service file
  - src: ./build/linux/runner.service
    dst: /etc/systemd/system/agentsmesh-runner.service
    type: config

  # Config directory
  - dst: /etc/agentsmesh
    type: dir
    file_info:
      mode: 0755

  # Data directory
  - dst: /var/lib/agentsmesh
    type: dir
    file_info:
      mode: 0755
      owner: agentsmesh
      group: agentsmesh

  # Log directory
  - dst: /var/log/agentsmesh
    type: dir
    file_info:
      mode: 0755
      owner: agentsmesh
      group: agentsmesh

scripts:
  postinstall: ./build/linux/postinst.sh
  preremove: ./build/linux/prerm.sh

overrides:
  deb:
    dependencies:
      - systemd
    recommends:
      - git
  rpm:
    dependencies:
      - systemd
    recommends:
      - git

# Package relationships
replaces:
  - agentsmesh-runner-cli
provides:
  - agentsmesh-runner
